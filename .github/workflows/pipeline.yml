name: Run pipeline

on:
  workflow_dispatch:
    inputs:
      workers:
        description: "Concurrent summarizer / data-availability workers"
        default: "4"
        required: false
      limit:
        description: "Pilot run: only process the first N papers (blank = all)"
        default: ""
        required: false

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      # bioinfolder.com (the Gemma endpoint) is on BCM's internal network and
      # is not reachable from GitHub-hosted runners directly. Tailscale joins
      # this runner to the tailnet for the job's duration so it can be reached
      # as if it were on the LAN. Requires the endpoint host (or a subnet
      # router covering it) to already be on the tailnet — see README.
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests openai pypdf pydantic python-dotenv pytest tinydb dagster

      - name: Run tests
        run: pytest tests/ -q

      - name: Materialize pipeline (download -> summarize -> data availability -> results)
        env:
          GEMMA_API_KEY: ${{ secrets.GEMMA_API_KEY }}
          GEMMA_BASE_URL: ${{ vars.GEMMA_BASE_URL }}
          GEMMA_MODEL: ${{ vars.GEMMA_MODEL }}
          SUMMARIZE_WORKERS: ${{ inputs.workers }}
          SCAN_WORKERS: ${{ inputs.workers }}
          PIPELINE_LIMIT: ${{ inputs.limit }}
        run: dagster asset materialize -m pipeline --select "*"

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add papers results paper_summary.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update pipeline outputs ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git push origin HEAD:${{ github.ref_name }}
          fi
